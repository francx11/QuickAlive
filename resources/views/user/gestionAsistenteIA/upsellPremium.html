<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asistente IA - Premium</title>
    <link
      rel="stylesheet"
      href="/public/assets/user/css/gestionAsistenteIA/asistente.css"
    />
  </head>
  <body>
    <header>
      <div class="logo">
        <img
          src="/public/assets/img/logo.png"
          alt="QuickAlive Logo"
        />
      </div>
      <h1>Asistente IA de actividades</h1>
    </header>

    <main>
      <div class="upsell-container">
        <p>
          El asistente IA de actividades es una función premium. Activa tu
          suscripción para chatear con el asistente y recibir recomendaciones
          personalizadas en lenguaje natural.
        </p>
        <!-- Demo: activa premium sin pasarela de pago real. TODO: sustituir por Stripe/PayPal. -->
        <button id="btn-activar-premium">Activar premium (demo)</button>
        <p id="upsell-mensaje"></p>
      </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      $("#btn-activar-premium").click(function () {
        $.get(
          "/backend/user/gestionAsistenteIA/activarPremiumDemo.php",
          function (response) {
            if (response && response.exito) {
              location.reload();
            } else {
              $("#upsell-mensaje").text(
                "No se pudo activar el premium. Inténtalo de nuevo."
              );
            }
          },
          "json"
        );
      });
    </script>
  </body>
</html>
